# Upstream Gunicorn (olatricity systemd service)
upstream olatricity_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirect HTTP → HTTPS (enable after certbot)
server {
    listen 80;
    listen [::]:80;
    server_name erp.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.yourdomain.com;

    # Certbot fills these paths after: certbot --nginx -d erp.yourdomain.com
    ssl_certificate     /etc/letsencrypt/live/erp.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    access_log /var/log/nginx/olatricity.access.log;
    error_log  /var/log/nginx/olatricity.error.log;

    # Static assets — served directly by nginx
    location /static/ {
        alias /opt/olatricity/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /health {
        proxy_pass http://olatricity_app;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://olatricity_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }
}
