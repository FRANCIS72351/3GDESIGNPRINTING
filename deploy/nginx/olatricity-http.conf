# Initial HTTP-only config — use before SSL certificates exist.
# After certbot: certbot --nginx -d erp.yourdomain.com
# Or replace with deploy/nginx/olatricity.conf once certs are in place.

upstream olatricity_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name erp.yourdomain.com;

    client_max_body_size 100M;

    access_log /var/log/nginx/olatricity.access.log;
    error_log  /var/log/nginx/olatricity.error.log;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /opt/olatricity/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /health {
        proxy_pass http://olatricity_app;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://olatricity_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }
}
