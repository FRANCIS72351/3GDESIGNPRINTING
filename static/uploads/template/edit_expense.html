{% extends "layout.html" %}

{% block title %}Edit Expense - 3G Design{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card shadow border-0 rounded-4 animate__animated animate__fadeInUp">
                <div class="card-header bg-danger text-white p-4">
                    <h3 class="mb-0"><i class="fas fa-edit me-2"></i>Edit Expense Record</h3>
                    <p class="mb-0 text-white-50">Admin-only: Modify recorded expenses</p>
                </div>
                <div class="card-body p-4">
                    <form action="{{ url_for('edit_expense', expense_id=expense.id) }}" method="POST">
                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label class="form-label fw-bold">Amount</label>
                                <input type="number" step="0.01" name="amount" class="form-control" value="{{ expense.amount }}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Currency</label>
                                <select class="form-select" name="currency">
                                    <option value="USD" {{ 'selected' if expense.currency == 'USD' }}>USD ($)</option>
                                    <option value="LRD" {{ 'selected' if expense.currency == 'LRD' }}>LRD (L$)</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>
                            <textarea name="description" class="form-control" rows="3" required>{{ expense.description }}</textarea>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger fw-bold">
                                <i class="fas fa-save me-2"></i>Update Expense
                            </button>
                            <a href="{{ url_for('financials') }}" class="btn btn-outline-secondary">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
