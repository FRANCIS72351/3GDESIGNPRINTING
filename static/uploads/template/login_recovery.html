<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Login - 3G DESIGN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
        <div class="login-card animate__animated animate__zoomIn">
            <h3>Emergency Recovery</h3>
            <p>Enter your 8-character backup code to bypass 2FA.</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="mb-3">
                {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div class="input-group">
                    <input type="text" id="recovery_code" name="recovery_code" placeholder="XXXXXXXX" required 
                           maxlength="8" style="text-transform: uppercase; font-family: monospace; letter-spacing: 2px; text-align: center;">
                </div>
                <button type="submit" class="login-btn" style="background: #dc3545;">Verify & Reset 2FA</button>
            </form>
            
            <div class="login-footer">
                <a href="{{ url_for('verify_2fa_page') }}">Back to 2FA</a> | 
                <a href="{{ url_for('login') }}">Back to Login</a>
            </div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-focus the input field
        document.getElementById('recovery_code').focus();

        // Auto-format input to uppercase
        document.getElementById('recovery_code').addEventListener('input', function(e) {
            this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        });
    </script>
</body>
</html>
